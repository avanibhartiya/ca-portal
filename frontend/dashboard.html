<!DOCTYPE html>
<html>
<head>
    <title>CA Portal Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <!-- LEFT: Logo + Title -->
    <div class="header-left">
        <img src="assets/logo.png" alt="Logo" class="logo">
        <div class="title-box">
        <h2>CA Sahayak</h2>
        <p id="financialYear" class="fy-text"></p>
    </div>
    </div>

    <!-- CENTER: Search Bar -->
    <div class="header-center">
    <input type="text" placeholder="Search tools here: " id="searchBar" onkeyup="showSuggestions()">
    <div id="suggestionsBox" class="suggestions"></div>
    </div>

    <!-- RIGHT: User Info -->
    <div class="header-right">

    <div class="user-menu">
        <span class="username" onclick="toggleDropdown()">Hello, User!</span>

        <div class="dropdown" id="userDropdown">
            <p onclick="openProfile()">Profile</p>
            <p onclick="openSettings()">Settings</p>
            <p onclick="logout()">Logout</p>
        </div>
    </div>
    </div>
</div>

<!-- MAIN LAYOUT -->
<div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Tools</h3>
        <ul>
            <li onclick="loadFeature('home')">Home</li>
            <li onclick="loadFeature('capital')">Capital Gain</li>
            <li onclick="loadFeature('gst')">GST Calculator</li>
            <li onclick="loadFeature('tax')">Income Tax</li>
        </ul>
    </div>

    <!-- CONTENT AREA -->
    <div class="content" id="content">

        <!-- Default Home Screen -->
        <h2>Welcome to CA Portal</h2>
        <p>Select a tool from the left panel to begin.</p>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>© 2026 CA Portal | Built by Avani Bhartiya </p>
</div>

<script src="script.js"></script>

</body>
</html>
